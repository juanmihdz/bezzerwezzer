services:
  postgres:
    image: postgres:18
    container_name: bezzerwizzer-db
    environment:
      POSTGRES_DB: bezzerwizzer
      POSTGRES_USER: bezzer
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bezzer_dev_2026}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed-questions.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bezzer -d bezzerwizzer"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    profiles: ["prod"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bezzerwizzer-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bezzerwizzer
      SPRING_DATASOURCE_USERNAME: bezzer
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-bezzer_dev_2026}
      SPRING_THREADS_VIRTUAL_ENABLED: "true"
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      JWT_SECRET: ${JWT_SECRET:-bezzerwizzer-dev-secret-change-in-prod-2026}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bezzerwizzer-ui
    ports:
      - "4200:80"
    depends_on:
      - backend

  backend-dev:
    profiles: ["dev"]
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: bezzerwizzer-api-dev
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bezzerwizzer
      SPRING_DATASOURCE_USERNAME: bezzer
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-bezzer_dev_2026}
      SPRING_THREADS_VIRTUAL_ENABLED: "true"
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:-bezzerwizzer-dev-secret-change-in-prod-2026}
    volumes:
      - ./backend:/app
      - maven-cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy

  frontend-dev:
    profiles: ["dev"]
    image: node:26-alpine
    container_name: bezzerwizzer-ui-dev
    working_dir: /app
    command: sh -c "npm ci && npm start -- --host 0.0.0.0 --poll 1000"
    ports:
      - "4200:4200"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend-dev

volumes:
  pgdata:
  maven-cache:
  frontend-node-modules:
