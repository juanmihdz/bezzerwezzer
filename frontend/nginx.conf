map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://backend:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ws {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    # Spring 7 correlates SockJS requests by the full remote socket address.
    # Docker/Nginx uses a different ephemeral upstream port per HTTP request,
    # so forward one stable address (including its port) for the whole client.
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Port 80;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_send_timeout 75s;
    proxy_read_timeout 75s;
    proxy_buffering off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
