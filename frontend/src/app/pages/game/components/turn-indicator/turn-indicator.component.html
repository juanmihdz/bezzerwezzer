@if (playerName) {
  <div class="flex items-center justify-center py-2 sm:py-3">
    <div
      class="turn-pill glass px-4 sm:px-7 py-3 sm:py-3.5 rounded-full flex items-center gap-3 sm:gap-5 animate-slide-up shadow-lg border border-white/10"
      [style.borderColor]="isMyTurn ? 'oklch(0.58 0.28 290 / 0.4)' : 'rgba(255,255,255,0.08)'"
      [style.boxShadow]="isMyTurn ? '0 0 1.5625rem oklch(0.58 0.28 290 / 0.15)' : 'none'"
    >
      <!-- Pulsing LED indicator in player color -->
      <div
        class="relative w-4.5 h-4.5 rounded-full shadow-inner border border-white/20"
        [style.backgroundColor]="playerColor"
        [style.boxShadow]="'0 0 0.75rem ' + playerColor"
      >
        <div class="absolute inset-0 bg-inherit rounded-full animate-ping opacity-75"></div>
      </div>
      <div class="flex flex-col">
        <span
          class="text-xs font-black uppercase tracking-[0.18em] text-text-muted/80 leading-none mb-1"
          >{{ phaseText }}</span
        >
        <span
          class="text-lg sm:text-2xl font-black font-display leading-none tracking-wide"
          [ngClass]="
            isMyTurn
              ? 'text-transparent bg-clip-text bg-gradient-to-r from-primary-light to-accent'
              : 'text-white'
          "
        >
          {{ isMyTurn ? '¡Es tu Turno!' : 'Turno de ' + playerName }}
        </span>
      </div>
    </div>
  </div>
}
