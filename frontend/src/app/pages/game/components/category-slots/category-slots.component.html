<div class="category-panel glass p-4 xl:p-5 rounded-3xl animate-slide-up h-full flex flex-col">
  <h3
    class="text-xl font-black mb-4 flex flex-wrap gap-2 items-center justify-between tracking-wide text-white"
  >
    <span class="category-heading"
      ><svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z" /></svg
      >Categorías</span
    >
    @if (isAssigning) {
      <span class="assignment-chip"> ARRASTRA PARA ORDENAR </span>
    }
  </h3>

  <div class="category-list flex w-full min-h-0 flex-grow flex-col gap-2.5 overflow-y-auto overflow-x-clip pr-1 max-[40rem]:overflow-y-visible">
    @for (slot of displaySlots; track slot.category.id; let i = $index) {
      <div
        class="category-row relative group"
        [class.is-assigning]="isAssigning"
        [class.is-dragging]="draggedIndex === i"
        [class.is-drop-target]="dropTargetIndex === i"
        [class.opacity-40]="slot.answered"
        [class.grayscale]="slot.answered"
        [attr.draggable]="isAssigning"
        [attr.tabindex]="isAssigning ? 0 : null"
        [attr.data-category-index]="i"
        [attr.aria-label]="
          isAssigning
            ? slot.category.name +
              ', ' +
              slot.pointValue +
              ' puntos. Arrastra o usa las flechas para intercambiar su puntuación.'
            : null
        "
        (dragstart)="startDrag($event, i)"
        (dragover)="allowDrop($event, i)"
        (dragleave)="clearDropTarget(i)"
        (drop)="drop($event, i)"
        (dragend)="endDrag()"
        (keydown)="moveWithKeyboard($event, i)"
      >
        <app-category-badge
          [name]="slot.category.name"
          [icon]="slot.category.icon"
          [color]="slot.category.color"
          [pointValue]="slot.pointValue"
          [isHighlighted]="isCurrentSlot(slot)"
          size="md"
        >
        </app-category-badge>
        <!-- Answered Checkmark Shield -->
        @if (slot.answered) {
          <div
            class="absolute inset-0 flex items-center justify-center bg-black/45 rounded-2xl z-30 backdrop-blur-[0.125rem]"
          >
            <div
              class="bg-correct/10 border border-correct/30 text-correct px-4 py-1.5 rounded-full text-xs font-black tracking-widest uppercase flex items-center gap-2 shadow-[0_0_0.9375rem_rgba(104,244,200,0.1)]"
            >
              <span>Resuelto</span>
              <svg class="resolved-check" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m5 12.5 4.2 4L19 7" />
              </svg>
            </div>
          </div>
        }
      </div>
    }
  </div>

  @if (isAssigning) {
    <button
      (click)="submitAssignment.emit()"
      [disabled]="!allAssigned"
      class="btn-primary w-full flex-none mt-4 text-base font-black py-3 rounded-2xl"
    >
      CONFIRMAR PUNTOS
    </button>
  }
</div>

@if (showAssignmentHint) {
  <div class="assignment-hint" role="status" aria-live="polite">
    <span class="hint-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path
          d="M8 11V7a2 2 0 0 1 4 0v3-5a2 2 0 0 1 4 0v5-3a2 2 0 0 1 4 0v7c0 4-3 7-7 7h-1c-3 0-5-1-7-4l-2-3a2 2 0 0 1 3-2l2 2v-3Z"
        />
      </svg>
    </span>
    <span
      ><strong>Ordena tus categorías</strong>Arrastra las tarjetas para colocarlas en los valores 4,
      3, 2 y 1.</span
    >
  </div>
}
