<div
  #boardSurface
  class="relative w-full max-w-4xl mx-auto aspect-square sm:aspect-[4/3] lg:aspect-auto lg:h-full lg:max-h-[720px] rounded-[1.75rem] sm:rounded-[2.5rem] p-3 md:p-7 border border-white/10 glass-strong shadow-[0_25px_60px_rgba(0,0,0,0.5)]"
>
  <div
    class="board-grid absolute inset-0 rounded-[inherit] pointer-events-none"
    aria-hidden="true"
  ></div>

  <!-- Central sci-fi reactor core / decoration -->
  <div
    class="board-core absolute inset-0 m-auto rounded-full border border-primary/20 flex flex-col items-center justify-center pointer-events-none bg-primary/5 backdrop-blur-md shadow-[0_0_50px_rgba(168,85,247,0.08)]"
  >
    <div
      class="absolute inset-2 rounded-full border border-dashed border-accent/20 animate-spin"
      style="animation-duration: 25s"
    ></div>
    <div class="absolute inset-5 rounded-full border border-primary/10"></div>
    <svg class="core-hexagon" viewBox="0 0 64 64" fill="none" aria-hidden="true">
      <path d="M32 6 53 18v28L32 58 11 46V18L32 6Z" />
    </svg>
    <svg viewBox="0 0 48 48" class="core-mark mb-1 h-8 w-8 md:h-10 md:w-10" fill="none" aria-label="Bezzerwizzer">
      <path d="M12 10h17c6 0 10 3 10 8 0 4-2 6-6 7 5 1 7 4 7 8 0 6-5 9-12 9H12V10Z" />
      <path d="M20 18h8c2 0 3 1 3 3s-1 3-3 3h-8v-6Zm0 13h9c2 0 3 1 3 3s-1 3-3 3h-9v-6Z" fill="var(--color-primary-light)" />
    </svg>
    <span
      class="board-core__title font-black font-display tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-primary-light to-accent"
      >BEZZER</span
    >
  </div>

  <!-- The Track -->
  <div class="relative w-full h-full z-10">
    @for (cell of cells; track cell; let i = $index) {
      <div
        class="absolute flex items-center justify-center rounded-full border transition-all duration-300 shadow-md cursor-help"
        [ngClass]="[
          i === 0
            ? 'bg-gradient-to-br from-primary to-accent border-white/30 w-8 h-8 md:w-11 md:h-11 z-10 glow-primary hover:scale-110'
            : i % 5 === 0
              ? 'bg-[#110e19] border-secondary/50 text-secondary w-9 h-9 md:w-13 md:h-13 hover:border-secondary shadow-[0_0_15px_rgba(104,244,200,0.15)] hover:scale-110'
              : 'bg-[#151122]/90 border-white/10 w-8 h-8 md:w-11 md:h-11 hover:border-primary/50 hover:scale-110',
        ]"
        [style.left]="cell.x + '%'"
        [style.top]="cell.y + '%'"
        [style.transform]="'translate(-50%, -50%)'"
      >
        @if (i === 0) {
          <svg class="start-icon" viewBox="0 0 24 24" role="img" aria-label="Inicio">
            <path d="M6 21V4m0 1c3-2 6 2 12 0v9c-6 2-9-2-12 0" />
          </svg>
        }
        @if (i !== 0 && i % 5 === 0) {
          <span class="text-[0.65rem] md:text-xs font-black">{{ i }}</span>
        }
      </div>
    }

    <!-- Player Pawns -->
    @for (player of players; track player) {
      <div
        class="absolute w-7 h-7 md:w-10 md:h-10 rounded-full shadow-2xl border-2 border-white transition-all duration-700 ease-in-out z-20 flex items-center justify-center font-black text-sm text-white"
        [ngClass]="{ 'animate-pulse scale-115': player.playerId === currentTurnPlayerId }"
        [style.backgroundColor]="player.color"
        [style.left]="getPawnPosition(player.boardPosition, player.playerId).x + '%'"
        [style.top]="getPawnPosition(player.boardPosition, player.playerId).y + '%'"
        [style.transform]="'translate(-50%, -50%)'"
        [style.boxShadow]="
          '0 0 20px ' +
          player.color +
          ', inset 0 2px 4px rgba(255,255,255,0.4), inset 0 -2px 4px rgba(0,0,0,0.3)'
        "
      >
        {{ player.username.charAt(0).toUpperCase() }}
      </div>
    }
  </div>
</div>
