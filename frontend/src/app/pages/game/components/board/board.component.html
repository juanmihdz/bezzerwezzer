<div
  class="board-surface relative w-full max-w-4xl mx-auto aspect-square sm:aspect-[4/3] lg:w-[min(100%,calc((100dvh-10rem)*4/3))] lg:h-auto lg:aspect-[4/3] rounded-[1.75rem] sm:rounded-[2.5rem] p-3 md:p-7"
>
  <div
    class="board-grid absolute inset-0 rounded-[inherit] pointer-events-none"
    aria-hidden="true"
  ></div>

  <!-- Central sci-fi reactor core / decoration -->
  <div class="board-aura" aria-hidden="true"></div>
  <div class="board-energy-node board-energy-node--one" aria-hidden="true"></div>
  <div class="board-energy-node board-energy-node--two" aria-hidden="true"></div>
  <div class="board-energy-node board-energy-node--three" aria-hidden="true"></div>
  <div class="board-core pointer-events-none absolute inset-0 m-auto flex aspect-square h-auto w-[clamp(9.25rem,30%,13.5rem)] flex-none flex-col items-center justify-center rounded-full max-[40rem]:w-[clamp(7.4rem,30%,9rem)]">
    <div class="core-orbit core-orbit--outer"></div>
    <div class="core-orbit core-orbit--inner"></div>
    <div class="core-orbit core-orbit--dotted"></div>
    <div class="core-orbit core-orbit--ticks"></div>
    <span
      class="board-core__title font-black font-display tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-primary-light to-accent"
      >BEZZER</span
    >
  </div>

  <!-- The Track -->
  <div #track class="relative w-full h-full z-10">
    @for (cell of cells; track cell; let i = $index) {
      <div
        class="track-cell absolute flex items-center justify-center rounded-full border transition-all duration-300 shadow-md"
        [ngClass]="[
          i === 0
            ? 'track-cell--start track-cell--goal w-10 h-10 md:w-14 md:h-14 z-10 hover:scale-110'
            : i % 5 === 0
              ? 'track-cell--milestone w-9 h-9 md:w-13 md:h-13 hover:scale-110'
              : 'track-cell--normal w-8 h-8 md:w-11 md:h-11 hover:scale-110',
        ]"
        [style.left]="cell.x + '%'"
        [style.top]="cell.y + '%'"
        [style.transform]="'translate(-50%, -50%)'"
      >
        @if (i === 0) {
          <svg class="start-icon" viewBox="0 0 24 24" role="img" aria-label="Salida y meta">
            <path d="M6 21V4m0 1c3-2 6 2 12 0v9c-6 2-9-2-12 0" />
          </svg>
        }
        @if (i !== 0 && i % 5 === 0) {
          <span class="text-[0.65rem] md:text-xs font-black">{{ i }}</span>
        }
      </div>
    }

    <!-- Player Pawns -->
    @for (player of players; track player.playerId) {
      @let pawnPosition = getPawnPosition(player);
      <div
        class="absolute w-7 h-7 md:w-10 md:h-10 rounded-full shadow-2xl border-2 border-white transition-all duration-700 ease-in-out z-20 flex items-center justify-center font-black text-sm text-white"
        [ngClass]="{ 'animate-pulse scale-115': player.playerId === currentTurnPlayerId }"
        [style.backgroundColor]="player.color"
        [style.left]="pawnPosition.x + '%'"
        [style.top]="pawnPosition.y + '%'"
        [style.transform]="'translate(-50%, -50%) translate(' + pawnPosition.offsetX + 'rem, ' + pawnPosition.offsetY + 'rem)'"
        [style.boxShadow]="
          '0 0 1.25rem ' +
          player.color +
          ', inset 0 0.125rem 0.25rem rgba(255,255,255,0.4), inset 0 -0.125rem 0.25rem rgba(0,0,0,0.3)'
        "
      >
        {{ player.username.charAt(0).toUpperCase() }}
      </div>
    }
  </div>
</div>
