<div class="flex flex-1 w-full items-center justify-center px-3 py-8 sm:px-5 sm:py-10 animate-fade-in">
  <div class="flex w-full max-w-6xl flex-col items-center justify-center gap-9 md:gap-11">

    <!-- Logo/Title Area -->
    <div class="text-center animate-slide-up w-full">
      <div class="relative inline-block">
        <div class="mx-auto mb-5 flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-primary to-accent shadow-[0_0_2.1875rem_oklch(0.58_0.28_290/0.35)] sm:h-16 sm:w-16">
          <svg viewBox="0 0 48 48" class="h-9 w-9 text-white" fill="none" aria-hidden="true"><path d="M12 10h17c6 0 10 3 10 8 0 4-2 6-6 7 5 1 7 4 7 8 0 6-5 9-12 9H12V10Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><path d="M20 18h8c2 0 3 1 3 3s-1 3-3 3h-8v-6Zm0 13h9c2 0 3 1 3 3s-1 3-3 3h-9v-6Z" fill="currentColor"/></svg>
        </div>
        <h1 class="relative z-10 mb-4 text-[clamp(2.65rem,9vw,5.5rem)] font-black tracking-[-0.06em] text-transparent bg-clip-text bg-gradient-to-r from-primary-light via-white to-accent drop-shadow-2xl leading-none">
          BEZZERWIZZER
        </h1>
        <div class="absolute inset-0 rounded-full bg-primary/20 blur-3xl z-0 animate-pulse-glow"></div>
      </div>
      <p class="text-lg font-medium tracking-wide text-text-muted sm:text-xl md:text-2xl mt-2">
        El Trivial Estratégico Online
      </p>
    </div>

    <!-- Action Cards Container (Side by Side using Flexbox) -->
    <div class="grid w-full grid-cols-1 items-stretch gap-6 delay-200 animate-slide-up md:grid-cols-2 md:gap-7 xl:gap-8">

      <!-- Join Room Card -->
      <div class="home-card glass mx-auto flex h-full w-full max-w-[32rem] flex-col p-6 sm:p-7 lg:p-8">
        <h2 class="home-card-title mb-5 flex items-center justify-center gap-3 px-2 py-1 text-center text-2xl font-extrabold leading-tight text-white sm:text-3xl">
          <span class="home-card-icon bg-primary/15 text-primary-light">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8.4 7.5h7.2a5.4 5.4 0 0 1 5.2 4l1 3.8a2.7 2.7 0 0 1-4.6 2.5l-1.8-1.9H8.6l-1.8 1.9a2.7 2.7 0 0 1-4.6-2.5l1-3.8a5.4 5.4 0 0 1 5.2-4Z"/><path d="M7.2 10.5v4M5.2 12.5h4M16.8 11.3h.01M19 13.5h.01"/></svg>
          </span>
          <span>Unirse a Sala</span>
        </h2>

        <div class="flex flex-col gap-5 mb-6">
          <div class="space-y-2 text-center">
            <label class="block text-sm font-black uppercase tracking-widest text-text-muted">Tu Nombre</label>
            <input type="text" [(ngModel)]="usernameJoin" placeholder="Ej: Maria"
              class="input-glass block w-full rounded-xl px-5 py-3.5 text-center text-lg font-bold transition-all duration-300 placeholder-[oklch(0.6_0.02_270)] sm:text-xl"
              (keyup.enter)="joinRoom()">
          </div>

          <div class="space-y-2 text-center">
            <label class="block text-sm font-black uppercase tracking-widest text-text-muted">Código de Sala</label>
            <input type="text" [(ngModel)]="roomCode" placeholder="ABCDEF"
              class="input-glass block w-full rounded-xl py-3.5 pl-[calc(1.25rem+0.24em)] pr-5 text-center text-3xl font-black uppercase tracking-[0.24em] transition-all duration-300 placeholder-[oklch(0.6_0.02_270)] sm:text-4xl sm:tracking-[0.3em]"
              maxlength="6"
              (keyup.enter)="joinRoom()">
          </div>
        </div>

        <div class="mt-auto pt-1">
          <button (click)="joinRoom()"
            [disabled]="!isValidJoin()"
            class="btn-primary w-full text-lg font-black py-4 px-5 rounded-2xl uppercase tracking-[0.06em] sm:text-xl">
            <span class="relative z-10 flex items-center justify-center gap-4">
              @if (!isLoadingJoin()) {
                <span>ENTRAR A LA SALA</span>
                <span class="text-2xl transition-transform group-hover:translate-x-2">→</span>
              } @else {
                <svg class="h-6 w-6 animate-spin" viewBox="0 0 24 24" fill="none" aria-label="Conectando"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="3" opacity=".25"/><path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
              }
            </span>
          </button>
        </div>
      </div>

      <!-- Create Room Card -->
      <div class="home-card glass relative mx-auto flex h-full w-full max-w-[32rem] flex-col p-6 sm:p-7 lg:p-8">
        <div class="pointer-events-none absolute top-0 right-0 h-60 w-60 rounded-bl-[9.375rem] bg-accent/10 blur-3xl"></div>

        <h2 class="home-card-title relative z-10 mb-5 flex items-center justify-center gap-3 px-2 py-1 text-center text-2xl font-extrabold leading-tight text-white sm:text-3xl">
          <span class="home-card-icon bg-accent/15 text-accent">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 7 4.5 4L12 4l4.5 7L21 7l-1.6 10H4.6L3 7Z"/><path d="M5 20h14"/></svg>
          </span>
          <span>Crear Sala</span>
        </h2>

        <div class="relative z-10 flex flex-col gap-5 mb-6">
          <div class="space-y-2 text-center">
            <label class="block text-sm font-black uppercase tracking-widest text-text-muted">Tu Nombre</label>
            <input type="text" [(ngModel)]="usernameCreate" placeholder="Ej: Carlos"
              class="input-glass block w-full rounded-xl px-5 py-3.5 text-center text-lg font-bold transition-all duration-300 placeholder-[oklch(0.6_0.02_270)] sm:text-xl"
              (keyup.enter)="createRoom()">
          </div>

          <div class="relative overflow-hidden rounded-xl bg-[#110e19]/60 p-4 text-center shadow-inner backdrop-blur-md sm:px-5">
            <div class="absolute left-0 top-0 h-1 w-full bg-gradient-to-r from-transparent via-accent to-transparent opacity-50"></div>
            <p class="text-base leading-relaxed text-gray-300">
              <span class="mb-1.5 flex items-center justify-center gap-2 text-base font-black text-accent sm:text-lg">
                <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 18h6M10 22h4M8.2 14.5A7 7 0 1 1 15.8 14.5C14.7 15.3 14 16.1 14 18h-4c0-1.9-.7-2.7-1.8-3.5Z"/></svg>
                Tip Anfitrión
              </span>
              Tú configurarás la partida y la iniciarás cuando todos tus amigos estén listos.
            </p>
          </div>
        </div>

        <div class="mt-auto pt-1">
          <button (click)="createRoom()"
            [disabled]="!isValidCreate()"
            class="btn-primary w-full text-lg font-black py-4 px-5 rounded-2xl uppercase tracking-[0.06em] sm:text-xl">
            <span class="relative z-10 flex items-center justify-center gap-4">
              @if (!isLoadingCreate()) {
                <span>NUEVA PARTIDA</span>
                <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="m12 2 1.2 4.2L17 8l-3.8 1.8L12 14l-1.2-4.2L7 8l3.8-1.8L12 2ZM19 14l.7 2.3L22 17l-2.3.7L19 20l-.7-2.3L16 17l2.3-.7L19 14ZM5 13l.8 2.7L8.5 17l-2.7 1.3L5 21l-.8-2.7L1.5 17l2.7-1.3L5 13Z"/></svg>
              } @else {
                <svg class="h-6 w-6 animate-spin" viewBox="0 0 24 24" fill="none" aria-label="Creando sala"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="3" opacity=".25"/><path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
              }
            </span>
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
