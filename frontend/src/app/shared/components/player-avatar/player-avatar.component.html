<div
  class="relative flex flex-col items-center justify-center group"
  [ngClass]="{ 'animate-bounce-in': animateInit }"
>
  <!-- Avatar Circle -->
  <div
    class="relative flex items-center justify-center rounded-full font-display font-black text-white shadow-xl transition-all duration-300 z-10"
    [ngClass]="[
      sizeClasses[size],
      isActive ? 'scale-110 shadow-2xl z-20' : 'group-hover:scale-105',
    ]"
    [style.backgroundColor]="color"
    [style.boxShadow]="
      isActive
        ? '0 0 25px ' + color + '80, inset 0 0 10px rgba(255,255,255,0.3)'
        : 'inset 0 0 10px rgba(255,255,255,0.1)'
    "
  >
    <span class="drop-shadow-md">{{ initial }}</span>

    <!-- Crown for host or winner -->
    @if (showCrown) {
      <div class="absolute -top-3 -right-2 text-2xl transform rotate-12 animate-float">👑</div>
    }
  </div>

  <!-- Active Glow Background -->
  @if (isActive) {
    <div
      class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full rounded-full blur-xl z-0 animate-pulse-glow"
      [style.backgroundColor]="color"
    ></div>
  }

  <!-- Username Label -->
  @if (showName) {
    <div
      class="mt-3 px-3 py-1 rounded-full text-sm font-semibold truncate max-w-[120px] text-center z-10 transition-colors"
      [ngClass]="
        isActive
          ? 'bg-white/20 text-white glass border-white/40'
          : 'text-text-muted bg-surface-elevated/50 border border-border/30'
      "
    >
      {{ username }}
    </div>
  }
</div>
